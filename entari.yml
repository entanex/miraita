basic:
  network:
    - type: ws
      host: 0.0.0.0
      port: 2310
      path: satori
      token: miraita2310

  prefix: ["/"]
  ignore_self_message: true
  log:
    level: info
    ignores: ["aiosqlite.core", "httpcore._trace"]
    save: false
    rich_error: false
    short_level: true

plugins:
  $files: []

  $prelude:
    - ::auto_reload

  .record_message:
    record_send: true

  .scheduler: {}

  .localdata:
    app_name: miraita

  ::help: {}

  ::auto_reload:
    watch_dirs: [.]
    watch_config: true
    $disable: env.ENVIRONMENT == "prod"

  browser:
    browser_type: firefox
    channel: firefox
    headless: true

  database:
    type: sqlite
    name: miraita.db
    driver: aiosqlite

  server:
    host: 0.0.0.0
    port: 2310
    path: satori
    token: miraita2310
    adapters:
      - $path: "@milky.main:MilkyWebsocketAdapter"
        endpoint: "http://localhost:3010"
        token: ${{ env.MILKY_TOKEN }}

  miraita: {}

  ?miraita.plugins.wakatime:
    client_id: ${{ env.WAKA_CLIENT_ID }}
    client_secret: ${{ env.WAKA_CLIENT_SECRET }}
    register_route: /register
    redirect_uri: ${{ env.WAKA_REDIRECT_URI }}
    background_source: Lolicon

  ?miraita.providers.llm:
    api_key: ${{ env.OPENAI_API_KEY }}
    base_url: https://api.openai.com/v1
    models:
      - name: "deepseek/deepseek-chat"
        api_key: ${{ env.DEEPSEEK_API_KEY }}
        base_url: https://api.deepseek.com
      - name: "gpt-4.1-mini"
        alias: "gpt"
      - name: "gemini/gemini-pro"
        alias: "gemini"
        api_key: ${{ env.GEMINI_API_KEY }}
        base_url: https://generativelanguage.googleapis.com
