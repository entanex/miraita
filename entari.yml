basic:
  network:
    - type: ws
      host: 0.0.0.0
      port: 2310
      path: satori
      token: miraita2310

  prefix: ["/"]
  ignore_self_message: true
  log:
    level: debug
    ignores:
      - aiosqlite.core
      - httpcore._trace
      - sentry_sdk.integrations.logging
    save: false
    rich_error: false
    short_level: true

plugins:
  $files: []

  $prelude:
    - ::auto_reload

  .record_message:
    record_send: true

  .scheduler: {}

  .localdata:
    app_name: miraita

  ::auto_reload:
    watch_dirs: [.]
    watch_config: true
    $disable: env.ENVIRONMENT == "prod"

  browser:
    browser_type: chromium
    channel: chromium
    headless: true
    auto_download_browser: true
    # playwright_download_host: https://cdn.playwright.dev/chrome-for-testing-public

  database:
    type: sqlite
    name: .miraita/miraita.db
    driver: aiosqlite

  server:
    host: 0.0.0.0
    port: 2310
    path: satori
    token: miraita2310
    adapters:
      - $path: "@milky.main"
        endpoint: "http://localhost:3010"
        token: ${{ env.MILKY_TOKEN }}

  miraita:

    .plugins.sentry:
      dsn: ${{ env.SENTRY_DSN }}
      environment: ${{ env.ENVIRONMENT }}   
      default_integrations: true
      auto_enabling_integrations: true
      enable_tracing: false
      enable_logs: true
      traces_sample_rate: 1.0
      profiles_sample_rate: 1.0

    .plugins.wakatime:
      client_id: ${{ env.WAKA_CLIENT_ID }}
      client_secret: ${{ env.WAKA_CLIENT_SECRET }}
      register_route: /register
      redirect_uri: ${{ env.WAKA_REDIRECT_URI }}
      background_source: Lolicon

    .providers.llm:
      api_key: ${{ env.OPENAI_API_KEY }}
      base_url: https://api.openai.com/v1
      models:
        - name: "deepseek/deepseek-chat"
          api_key: ${{ env.DEEPSEEK_API_KEY }}
          base_url: https://api.deepseek.com

        - name: "deepseek/deepseek-reasoner"
          api_key: ${{ env.DEEPSEEK_API_KEY }}
          base_url: https://api.deepseek.com
